version: "3.8"

networks:
  kinetic-network:
    driver: bridge

volumes:
  kinetic-db-data:
    driver: local

services:
  mongo-db:
    image: mongo:latest
    container_name: kinetic-db
    restart: always
    ports:
      - "27018:27017"
    volumes:
      - kinetic-db-data:/data/db
    networks:
      - kinetic-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: kinetic-backend
    restart: always
    ports:
      - "3000:3000"
    networks:
      - kinetic-network
    depends_on:
      mongo-db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      - MONGO_URI=mongodb://mongo-db:27017/kinetic
      - NODE_ENV=production

  frontend:
    build: ./frontend
    container_name: kinetic-frontend
    restart: always
    ports:
      - "5173:5173"
    networks:
      - kinetic-network
    depends_on:
      - backend
    env_file:
      - ./frontend/.env
    environment:
      - VITE_API_URL=http://backend:3000
